<div class="not-prose max-w-3xl mt-10">
  <form
    action="https://formspree.io/f/xnjgpyqy"
    method="POST"
    class="space-y-6 bg-white rounded-2xl shadow-sm ring-1 ring-gray-200 p-6 md:p-8"
  >
    <div>
      <label for="name" class="block text-sm font-medium text-gray-900 mb-2">Your name</label>
      <input
        id="name"
        type="text"
        name="name"
        required
        class="w-full rounded-lg border border-gray-300 px-4 py-3 text-gray-900 focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-200"
      >
    </div>

    <div>
      <label for="company" class="block text-sm font-medium text-gray-900 mb-2">Company</label>
      <input
        id="company"
        type="text"
        name="company"
        class="w-full rounded-lg border border-gray-300 px-4 py-3 text-gray-900 focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-200"
      >
    </div>

    <div>
      <label for="email" class="block text-sm font-medium text-gray-900 mb-2">Email address</label>
      <input
        id="email"
        type="email"
        name="email"
        required
        class="w-full rounded-lg border border-gray-300 px-4 py-3 text-gray-900 focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-200"
      >
    </div>

    <div>
      <label for="interest" class="block text-sm font-medium text-gray-900 mb-2">Enquiry type</label>
      <select
        id="interest"
        name="interest"
        class="w-full rounded-lg border border-gray-300 px-4 py-3 text-gray-900 focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-200"
      >
        <option value="General enquiry">General enquiry</option>
        <option value="TMC discussion">TMC discussion</option>
        <option value="Corporate or client interest">Corporate or client interest</option>
        <option value="API or integration discussion">API or integration discussion</option>
        <option value="Partnership opportunity">Partnership opportunity</option>
        <option value="Press or media">Press or media</option>
      </select>
    </div>

    <div>
      <label for="message" class="block text-sm font-medium text-gray-900 mb-2">Message</label>
      <textarea
        id="message"
        name="message"
        rows="7"
        required
        class="w-full rounded-lg border border-gray-300 px-4 py-3 text-gray-900 focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-200"
      ></textarea>
    </div>

    <input type="hidden" name="_subject" value="New Cinturon360 contact form submission">

    <div>
      <button
        type="submit"
        class="inline-flex items-center justify-center rounded-lg bg-primary-600 px-6 py-3 text-white font-medium hover:bg-primary-700 transition"
      >
        Send message
      </button>
    </div>
  </form>
</div>
